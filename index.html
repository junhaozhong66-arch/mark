<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>期末考试成绩查询</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }
  .header {
    text-align: center;
    color: #fff;
    margin: 20px 0 30px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.15);
  }
  .header p {
    font-size: 14px;
    opacity: 0.85;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    padding: 28px 24px;
    width: 100%;
    max-width: 400px;
  }
  .form-group {
    margin-bottom: 18px;
  }
  .form-group label {
    display: block;
    font-size: 14px;
    color: #444;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e8e8e8;
    border-radius: 10px;
    font-size: 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    -webkit-appearance: none;
  }
  .form-group input:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
  }
  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 6px;
  }
  .btn:active {
    transform: scale(0.97);
    box-shadow: 0 2px 8px rgba(102,126,234,0.3);
  }
  .error-msg {
    color: #e74c3c;
    font-size: 13px;
    margin-top: 10px;
    text-align: center;
    display: none;
  }
  .result {
    display: none;
    width: 100%;
    max-width: 400px;
    margin-top: 20px;
  }
  .result-card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    overflow: hidden;
  }
  .result-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    padding: 20px 24px;
    text-align: center;
  }
  .result-header .name {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .result-header .info {
    font-size: 13px;
    opacity: 0.85;
  }
  .score-summary {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 18px 24px;
    background: #f8f9ff;
    border-bottom: 1px solid #eee;
  }
  .score-summary .item {
    text-align: center;
  }
  .score-summary .item .label {
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
  }
  .score-summary .item .value {
    font-size: 24px;
    font-weight: 700;
    color: #667eea;
  }
  .score-table {
    padding: 16px 20px 20px;
  }
  .score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 8px;
    border-bottom: 1px solid #f0f0f0;
  }
  .score-row:last-child {
    border-bottom: none;
  }
  .score-row .subject {
    font-size: 15px;
    color: #333;
    font-weight: 500;
    min-width: 60px;
  }
  .score-row .score {
    font-size: 16px;
    font-weight: 600;
    color: #444;
    text-align: right;
  }
  .score-row .score.high {
    color: #27ae60;
  }
  .score-row .score.low {
    color: #e74c3c;
  }
  .score-row .score.special {
    color: #e67e22;
    font-size: 12px;
    font-weight: 500;
    max-width: 200px;
    text-align: right;
  }
  .back-btn {
    display: block;
    text-align: center;
    margin-top: 16px;
    color: #fff;
    font-size: 14px;
    opacity: 0.9;
    cursor: pointer;
    padding: 10px;
  }
  .footer {
    margin-top: 30px;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    text-align: center;
  }
  .icon-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot-green { background: #27ae60; }
  .dot-red { background: #e74c3c; }
  .dot-orange { background: #e67e22; }
</style>
</head>
<body>

<div class="header">
  <h1>高二年级11班 期末考试成绩查询</h1>
  <p>2025学年第二学期综合训练</p>
</div>

<div class="card" id="queryForm">

    <label>学号</label>
    <input type="text" id="studentId" placeholder="请输入学号（如 20271127）" autocomplete="off">
  </div>
  <div class="form-group">
    <label>姓名</label>
    <input type="text" id="studentName" placeholder="请输入姓名" autocomplete="off">
  </div>
  <button class="btn" onclick="queryScore()">查询成绩</button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<div class="result" id="resultArea">
  <div class="result-card">
    <div class="result-header">
      <div class="name" id="rName"></div>
      <div class="info" id="rInfo"></div>
    </div>
    <div class="score-summary">
      <div class="item">
        <div class="label">总分</div>
        <div class="value" id="rTotal"></div>
      </div>
      <div class="item">
        <div class="label">主科总分</div>
        <div class="value" id="rMainTotal"></div>
      </div>
    </div>
    <div class="score-table" id="scoreTable"></div>
  </div>
  <div class="back-btn" onclick="goBack()">返回重新查询</div>
</div>

<div class="footer">仅供本班学生查询使用</div>

];

const SUBJECTS = [
  {key:"chinese", label:"\u8bed\u6587", full:150},
  {key:"math", label:"\u6570\u5b66", full:150},
  {key:"english", label:"\u82f1\u8bed", full:130},
  {key:"politics", label:"\u653f\u6cbb", full:100},
  {key:"history", label:"\u5386\u53f2", full:100},
  {key:"geography", label:"\u5730\u7406", full:100},
  {key:"japanese", label:"\u65e5\u8bed", full:150}
];

function queryScore() {
  const sid = document.getElementById('studentId').value.trim();
  const name = document.getElementById('studentName').value.trim();
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  if (!sid) { showError('\u8bf7\u8f93\u5165\u5b66\u53f7'); return; }
  if (!name) { showError('\u8bf7\u8f93\u5165\u59d3\u540d'); return; }

  const student = DATA.find(s => s.sid === sid && s.name === name);
  if (!student) {
    showError('\u5b66\u53f7\u6216\u59d3\u540d\u4e0d\u5339\u914d\uff0c\u8bf7\u68c0\u67e5\u540e\u91cd\u8bd5');
    return;
  }

  showResult(student);
}

function showError(msg) {
  const errEl = document.getElementById('errorMsg');
  errEl.textContent = msg;
  errEl.style.display = 'block';
}

function showResult(s) {
  document.getElementById('queryForm').style.display = 'none';
  document.getElementById('resultArea').style.display = 'block';
  document.getElementById('rName').textContent = s.name;
  document.getElementById('rInfo').textContent = '\u5b66\u53f7 ' + s.sid + ' | \u9ad8\u4e8c\u5e74\u7ea711\u73ed';
  document.getElementById('rTotal').textContent = s.total;
  document.getElementById('rMainTotal').textContent = s.main_total;

  let html = '';
  for (const subj of SUBJECTS) {
    const val = s[subj.key];
    if (val === '-' || val === null || val === undefined) continue;
    const isStr = typeof val === 'string';
    let scoreClass = '';
    let displayVal = val;
    if (isStr) {
      scoreClass = 'special';
      displayVal = val;
    } else {
      const ratio = val / subj.full;
      if (ratio >= 0.8) scoreClass = 'high';
      else if (ratio < 0.4) scoreClass = 'low';
      displayVal = val;
    }
    html += '<div class="score-row">' +
      '<span class="subject">' + subj.label + '</span>' +
      '<span class="score ' + scoreClass + '">' + displayVal + (isStr ? '' : ' / ' + subj.full) + '</span>' +
      '</div>';
  }
  document.getElementById('scoreTable').innerHTML = html;
}

function goBack() {
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('queryForm').style.display = 'block';
  document.getElementById('studentId').value = '';
  document.getElementById('studentName').value = '';
  document.getElementById('errorMsg').style.display = 'none';
}

// Allow Enter key to submit
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('queryForm').style.display !== 'none') {
    queryScore();
  }
});
